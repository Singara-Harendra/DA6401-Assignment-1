program: src/train.py
project: da6401-mlp
method: bayes
metric:
  name: val_accuracy
  goal: maximize
parameters:
  optimizer:
    values: ["sgd", "momentum", "nag", "rmsprop"]
  learning_rate:
    values: [0.001, 0.005, 0.01, 0.05]
  num_layers:
    values: [2, 3, 4]
  hidden_size:
    values: [64, 128]
  activation:
    values: ["relu", "sigmoid", "tanh"]
  weight_init:
    values: ["xavier", "random"]
  batch_size:
    values: [32, 64, 128]
  weight_decay:
    values: [0.0, 0.0005]
  epochs:
    value: 10
  loss:
    value: "cross_entropy"
  dataset:
    value: "mnist"